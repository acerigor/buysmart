<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction Credentials — BuySmart</title>
<link rel="stylesheet" href="shared/app.css">
<link rel="stylesheet" href="shared/settings.css">
<link rel="stylesheet" href="shared/contact-panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0f1117;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
.root.main-area{height:calc(100vh - 64px);min-height:0;overflow:hidden;display:flex;flex-direction:column;}
@media (max-width:640px){ .root.main-area{height:auto;min-height:0;overflow:visible;} }
.ac-av-row{display:inline-flex;align-items:center;cursor:pointer;}
.ac-av-row > *:not(:first-child){margin-left:-6px;}
.ac-av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;border:2px solid var(--sur);flex-shrink:0;position:relative;}
.ac-av-more{background:var(--sur2);color:var(--tx);font-size:10px;}
.ac-av-empty{color:var(--mu);font-size:12px;padding:4px 8px;}
.ac-av[data-label]:hover{z-index:2;}
.ac-tooltip{position:fixed;pointer-events:none;background:var(--sur2);color:var(--ac2);border:0.5px solid var(--ac);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;font-family:var(--font);white-space:nowrap;box-shadow:0 6px 16px rgba(0,0,0,.4);opacity:0;transition:opacity .12s;z-index:9999;top:0;left:0;}
.ac-tooltip.show{opacity:1;}
.ac-chip-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.ac-chip{padding:3px 4px 3px 10px;gap:6px;}
.ac-chip-x{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border:none;background:transparent;color:var(--ac2);cursor:pointer;padding:0;border-radius:4px;transition:background .1s;}
.ac-chip-x:hover{background:rgba(79,124,255,.20);}
.modal-delete{background:var(--rd);color:#fff;border:none;padding:0 18px;height:34px;border-radius:8px;font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;transition:background .12s;}
.modal-delete:hover{background:#c94747;}
</style>
</head>
<body>

<div class="root main-area" id="root">
  <div class="set-page-head">
    <button class="back-btn" onclick="location.href='settings.html'" aria-label="Back to Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Settings
    </button>
    <span class="set-page-title"></span>
    <div class="sp"></div>
    <button class="tbtn tbtn-p" onclick="acOpenAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>New Credentials</span>
    </button>
  </div>
  <div class="assign-popup" id="ac-assign-popup" style="display:none;">
    <div class="assign-popup-title">Assign to</div>
    <div class="assign-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="ac-assign-search-input" type="text" placeholder="Search people…" oninput="acRenderAssign(this.value)"/>
    </div>
    <div class="assign-list" id="ac-assign-list"></div>
    <div class="assign-unassign" onclick="acAssignUnassign()">
      <div class="assign-user-av" style="background:var(--sur2);border:0.5px solid var(--brd2);">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/><line x1="4" y1="4" x2="20" y2="20"/>
        </svg>
      </div>
      <span>Unassign</span>
    </div>
  </div>
  <div class="modal-backdrop modal-fullscreen-mobile" id="ac-edit-modal" onclick="if(event.target===this) acCloseEdit()">
    <div class="modal modal--wide">
      <div class="modal-header">
        <div class="modal-title">Edit Auction Credential</div>
        <button class="modal-close" onclick="acCloseEdit()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="us-add-section">
          <div class="us-add-section-head"><h4 class="us-add-section-title">Auction Setup</h4></div>
          <div class="us-add-field">
            <label>Auction</label>
            <input type="text" id="ac-e-auction" disabled/>
          </div>
          <div class="us-add-field">
            <label>Select Users</label>
            <button class="ls-tpl-btn" id="ac-e-users-btn" type="button" onclick="acOpenAssign(event)">
              <span style="color:var(--mu);">Add a user</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="ac-chip-row" id="ac-e-chips" style="margin-top:8px;"></div>
          </div>
        </div>
        <div class="us-add-section">
          <div class="us-add-section-head"><h4 class="us-add-section-title">Log in Credential</h4></div>
          <div class="us-add-field"><label>UserName</label><input type="text" id="ac-e-userName"/></div>
          <div class="us-add-field">
            <label>Password</label>
            <div class="us-pw-wrap">
              <input type="password" id="ac-e-password"/>
              <button type="button" class="us-pw-eye" onclick="acTogglePw('ac-e-password', this)" aria-label="Show password">
                <svg class="us-pw-svg us-pw-svg-on"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="us-pw-svg us-pw-svg-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="us-add-section">
          <div class="us-add-section-head"><h4 class="us-add-section-title">Email Credential</h4></div>
          <div class="us-add-field"><label>Email Username</label><input type="text" id="ac-e-emailUsername"/></div>
          <div class="us-add-field">
            <label>Email Password</label>
            <div class="us-pw-wrap">
              <input type="password" id="ac-e-emailPassword"/>
              <button type="button" class="us-pw-eye" onclick="acTogglePw('ac-e-emailPassword', this)" aria-label="Show password">
                <svg class="us-pw-svg us-pw-svg-on"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="us-pw-svg us-pw-svg-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <div class="us-add-field"><label>Email Host</label><input type="text" id="ac-e-emailHost"/></div>
          <div class="us-add-field"><label>Email Port</label><input type="text" id="ac-e-emailPort"/></div>
          <div class="us-add-field" style="flex-direction:row;align-items:center;gap:10px;">
            <span class="tog off" id="ac-e-ssl" onclick="this.classList.toggle('off')"></span>
            <label style="margin:0;">Enable SSL</label>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:space-between;">
        <button class="modal-delete" onclick="acDelete()">Delete</button>
        <div style="display:flex;gap:8px;">
          <button class="modal-cancel" onclick="acCloseEdit()">Cancel</button>
          <button class="modal-save"   onclick="acSaveEdit()">Save</button>
        </div>
      </div>
    </div>
  </div>
  <div class="set-scroll">
    <section class="set-section" style="padding:0;">
      <div class="table-wrap" style="margin:0 24px 24px;">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th style="width:48px;text-align:center;"><input type="checkbox" id="ac-check-all" onchange="acToggleAll(this)"/></th>
                <th style="width:64px;text-align:center;">No.</th>
                <th style="text-align:left;padding-left:24px;">Auction</th>
                <th style="text-align:left;">Users</th>
                <th style="width:280px;text-align:left;">UserName</th>
              </tr>
            </thead>
            <tbody id="ac-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="shared/notifications.js"></script>
<script src="shared/contact-panel.js"></script>
<script src="shared/shell.js"></script>
<script>BuySmartShell.init({ page: 'settings', title: 'Auction Credentials' });</script>
<script>
function acOpenAddModal(){
  acEditingMode = 'add';
  acEditingId   = null;
  acEditingUsers = [];
  document.querySelector('#ac-edit-modal .modal-title').textContent = 'Add Auction Credential';
  const auctionEl = document.getElementById('ac-e-auction');
  auctionEl.value    = '';
  auctionEl.disabled = false;
  document.getElementById('ac-e-userName').value      = '';
  document.getElementById('ac-e-password').value      = '';
  document.getElementById('ac-e-password').type       = 'password';
  document.getElementById('ac-e-emailUsername').value = '';
  document.getElementById('ac-e-emailPassword').value = '';
  document.getElementById('ac-e-emailPassword').type  = 'password';
  document.getElementById('ac-e-emailHost').value     = 'imap.gmail.com';
  document.getElementById('ac-e-emailPort').value     = '993';
  document.getElementById('ac-e-ssl').classList.add('off');
  document.querySelectorAll('.us-pw-eye').forEach(function(b){ b.classList.remove('showing'); });
  acCloseAssign();
  acRenderChips();
  const del = document.querySelector('#ac-edit-modal .modal-delete');
  if(del) del.style.display = 'none';
  document.getElementById('ac-edit-modal').classList.add('open');
  setTimeout(function(){ auctionEl.focus(); }, 30);
}

const AC_SEED = [
  { id:1, auction:'Manheim',                 users:['Amin Hussain','Hardik Patadiya'], userName:'group1llc',                 password:'Password123', emailUsername:'server@usadirectauto.com',    emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:2, auction:'Smart Auction',           users:['Amin Hussain','Brenda Loredo','Buyer','Hardik Patadiya','Inspector','Jane Peras'], userName:'karina93', password:'Password123', emailUsername:'server@usadirectauto.com', emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:3, auction:'Adesa',                   users:['Amin Hussain','Hardik Patadiya'], userName:'shaun@usadirectauto.com',   password:'Password123', emailUsername:'server@usadirectauto.com',    emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:4, auction:'IAAI',                    users:['Amin Hussain','Hardik Patadiya'], userName:'usadirectautotx@gmail.com', password:'Password123', emailUsername:'server@usadirectauto.com',    emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:5, auction:'1st Choice Auto Auction', users:['Amin Hussain','Brenda Loredo','Buyer','Hardik Patadiya','Inspector','Jane Peras'], userName:'usadirectautotx@gmail.com', password:'Password123', emailUsername:'server@usadirectauto.com', emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:6, auction:"America's Auto Auction",  users:['Amin Hussain','Hardik Patadiya','Shaun Leva'], userName:'usadirectautotx@gmail.com', password:'Password123', emailUsername:'server@usadirectauto.com', emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:7, auction:'Carmax',                  users:['Hardik Patadiya','Inspector','Buyer','Amin Hussain'], userName:'usadirectautotx@gmail.com', password:'Password123', emailUsername:'server@usadirectauto.com', emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
  { id:8, auction:'Carmax',                  users:['Luis Rodriguez'], userName:'zoommotorclub@gmail.com',                    password:'Password123', emailUsername:'server@usadirectauto.com',    emailPassword:'EmailPass123', emailHost:'imap.gmail.com', emailPort:'993', enableSsl:false },
];
const AC_PEOPLE = [
  { key:'AH', name:'Amin Hussain',    role:'Sales Rep', color:'#26c281' },
  { key:'BL', name:'Brenda Loredo',   role:'Sales Rep', color:'#8a5cf6' },
  { key:'BY', name:'Buyer',           role:'Buyer',     color:'#f19828' },
  { key:'HP', name:'Hardik Patadiya', role:'Sales Rep', color:'#4f7cff' },
  { key:'IN', name:'Inspector',       role:'Inspector', color:'#2dd4bf' },
  { key:'JP', name:'Jane Peras',      role:'Sales Rep', color:'#e55555' },
  { key:'SL', name:'Shaun Leva',      role:'Sales Rep', color:'#c4b5fd' },
  { key:'LR', name:'Luis Rodriguez',  role:'Sales Rep', color:'#4f7cff' },
];
let acEditingId = null;
let acEditingUsers = [];
let acEditingMode = null;
let acSearchQ = '';
function acEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const AC_PALETTE = ['#4f7cff','#26c281','#f19828','#8a5cf6','#e55555','#2dd4bf','#c4b5fd'];
function acColorFor(name){
  const p = AC_PEOPLE.find(function(x){ return x.name === name; });
  if(p) return p.color;
  let h = 0;
  for(let i=0; i<name.length; i++) h = ((h<<5) - h + name.charCodeAt(i)) | 0;
  return AC_PALETTE[Math.abs(h) % AC_PALETTE.length];
}
function acInitials(name){
  return String(name||'').trim().split(/\s+/).slice(0,2).map(function(w){ return w[0] || ''; }).join('').toUpperCase();
}
function acAvatarHtml(name){
  return '<div class="ac-av" style="background:' + acColorFor(name) + ';" data-label="' + acEsc(name) + '">' + acInitials(name) + '</div>';
}
function acAssignCellHtml(rowId, users){
  const list = users || [];
  const shown = list.slice(0, 3);
  const rest  = list.length - shown.length;
  return '<div class="ac-av-row" onclick="acOpenEdit(' + rowId + ')">' +
    shown.map(acAvatarHtml).join('') +
    (rest > 0 ? '<div class="ac-av ac-av-more" data-label="' + rest + ' more">+' + rest + '</div>' : '') +
    (list.length === 0 ? '<span class="ac-av-empty">—</span>' : '') +
  '</div>';
}
function acRowHtml(r){
  return '<tr>' +
    '<td style="text-align:center;"><input type="checkbox" class="ac-row-check" data-id="' + r.id + '" onchange="acSyncAll()"/></td>' +
    '<td style="text-align:center;"><a class="us-user-link" href="javascript:void(0)" onclick="acOpenEdit(' + r.id + ')">' + r.id + '</a></td>' +
    '<td style="text-align:left;padding-left:24px;"><a class="us-user-link" href="javascript:void(0)" onclick="acOpenEdit(' + r.id + ')">' + acEsc(r.auction) + '</a></td>' +
    '<td>' + acAssignCellHtml(r.id, r.users) + '</td>' +
    '<td>' + acEsc(r.userName) + '</td>' +
  '</tr>';
}
function acRender(){
  const q = acSearchQ.trim().toLowerCase();
  const visible = AC_SEED.filter(function(r){
    return !q
        || r.auction.toLowerCase().includes(q)
        || (r.users||[]).join(',').toLowerCase().includes(q)
        || (r.userName||'').toLowerCase().includes(q);
  });
  document.getElementById('ac-tbody').innerHTML = visible.map(acRowHtml).join('');
  acSyncAll();
}
function acToggleAll(el){
  document.querySelectorAll('.ac-row-check').forEach(function(c){ c.checked = el.checked; });
}
function acSyncAll(){
  const boxes = document.querySelectorAll('.ac-row-check');
  const all = boxes.length > 0 && Array.from(boxes).every(function(b){ return b.checked; });
  const some = Array.from(boxes).some(function(b){ return b.checked; });
  const el = document.getElementById('ac-check-all');
  if(el){ el.checked = all; el.indeterminate = !all && some; }
}
function acOpenEdit(id){
  const r = AC_SEED.find(function(x){ return x.id === id; });
  if(!r) return;
  acEditingMode = 'edit';
  acEditingId = id;
  acEditingUsers = (r.users || []).slice();
  document.querySelector('#ac-edit-modal .modal-title').textContent = 'Edit Auction Credential';
  document.getElementById('ac-e-auction').disabled    = true;
  const del = document.querySelector('#ac-edit-modal .modal-delete');
  if(del) del.style.display = '';
  document.getElementById('ac-e-auction').value       = r.auction || '';
  document.getElementById('ac-e-userName').value      = r.userName || '';
  document.getElementById('ac-e-password').value      = r.password || '';
  document.getElementById('ac-e-password').type       = 'password';
  document.getElementById('ac-e-emailUsername').value = r.emailUsername || '';
  document.getElementById('ac-e-emailPassword').value = r.emailPassword || '';
  document.getElementById('ac-e-emailPassword').type  = 'password';
  document.getElementById('ac-e-emailHost').value     = r.emailHost || '';
  document.getElementById('ac-e-emailPort').value     = r.emailPort || '';
  document.getElementById('ac-e-ssl').classList.toggle('off', !r.enableSsl);
  document.querySelectorAll('.us-pw-eye').forEach(function(b){ b.classList.remove('showing'); });
  acCloseAssign();
  acRenderChips();
  document.getElementById('ac-edit-modal').classList.add('open');
}
function acCloseEdit(){
  document.getElementById('ac-edit-modal').classList.remove('open');
  acCloseAssign();
  acEditingId = null;
}
function acRenderChips(){
  const el = document.getElementById('ac-e-chips'); if(!el) return;
  el.innerHTML = acEditingUsers.map(function(n){
    const safe = n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<span class="badge badge--accent ac-chip">' +
      '<span>' + acEsc(n) + '</span>' +
      '<button class="ac-chip-x" type="button" onclick="acRemoveUserChip(\'' + safe + '\')" aria-label="Remove">' +
        '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
      '</button>' +
    '</span>';
  }).join('');
}
function acOpenAssign(e){
  e.stopPropagation();
  const pop = document.getElementById('ac-assign-popup');
  document.getElementById('ac-assign-search-input').value = '';
  acRenderAssign('');
  pop.style.display = 'block';
  pop.style.top = '-9999px'; pop.style.left = '0';
  const pr = pop.getBoundingClientRect();
  const rect = e.currentTarget.getBoundingClientRect();
  let top = rect.bottom + 4;
  if(top + pr.height > window.innerHeight - 8){
    const above = rect.top - pr.height - 4;
    top = (above >= 8) ? above : Math.max(8, window.innerHeight - pr.height - 8);
  }
  let left = rect.left;
  if(left + pr.width > window.innerWidth - 8) left = window.innerWidth - pr.width - 8;
  if(left < 8) left = 8;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
}
function acCloseAssign(){
  document.getElementById('ac-assign-popup').style.display = 'none';
}
function acRenderAssign(q){
  const query = (q||'').trim().toLowerCase();
  const assigned = new Set(acEditingUsers);
  const list = AC_PEOPLE.filter(function(p){
    return !query || p.name.toLowerCase().includes(query) || (p.role||'').toLowerCase().includes(query);
  });
  const el = document.getElementById('ac-assign-list');
  if(!list.length){ el.innerHTML = '<div class="assign-list-empty">No people found</div>'; return; }
  el.innerHTML = list.map(function(p){
    const on = assigned.has(p.name);
    return '<div class="assign-user" onclick="acAssignToggle(\'' + p.key + '\')">' +
      '<div class="assign-user-av" style="background:' + p.color + ';">' + p.key + '</div>' +
      '<div style="flex:1;"><div class="assign-user-name">' + acEsc(p.name) + '</div><div class="assign-user-role">' + acEsc(p.role||'') + '</div></div>' +
      (on ? '<span style="color:var(--ac);font-size:14px;">&#10003;</span>' : '') +
    '</div>';
  }).join('');
}
function acAssignToggle(key){
  const person = AC_PEOPLE.find(function(p){ return p.key === key; });
  if(!person) return;
  const i = acEditingUsers.indexOf(person.name);
  if(i >= 0) acEditingUsers.splice(i, 1); else acEditingUsers.push(person.name);
  acRenderChips();
  acRenderAssign(document.getElementById('ac-assign-search-input').value);
}
function acAssignUnassign(){
  acEditingUsers = [];
  acRenderChips();
  acCloseAssign();
}
function acRemoveUserChip(name){
  acEditingUsers = acEditingUsers.filter(function(u){ return u !== name; });
  acRenderChips();
  const pop = document.getElementById('ac-assign-popup');
  if(pop && pop.style.display === 'block') acRenderAssign(document.getElementById('ac-assign-search-input').value);
}
function acTogglePw(inputId, btnEl){
  const inp = document.getElementById(inputId);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btnEl.classList.toggle('showing', !showing);
}
function acSaveEdit(){
  const auction  = document.getElementById('ac-e-auction').value.trim();
  const userName = document.getElementById('ac-e-userName').value.trim();
  if(!auction){
    window.showNavToast('Auction required', 'Enter an auction name.');
    document.getElementById('ac-e-auction').focus();
    return;
  }
  if(!userName){
    window.showNavToast('UserName required', 'Enter a login username.');
    document.getElementById('ac-e-userName').focus();
    return;
  }
  const fields = {
    auction:       auction,
    userName:      userName,
    password:      document.getElementById('ac-e-password').value,
    emailUsername: document.getElementById('ac-e-emailUsername').value,
    emailPassword: document.getElementById('ac-e-emailPassword').value,
    emailHost:     document.getElementById('ac-e-emailHost').value,
    emailPort:     document.getElementById('ac-e-emailPort').value,
    enableSsl:     !document.getElementById('ac-e-ssl').classList.contains('off'),
    users:         acEditingUsers.slice()
  };
  if(acEditingMode === 'add'){
    const nextId = AC_SEED.reduce(function(m,r){ return Math.max(m, r.id || 0); }, 0) + 1;
    AC_SEED.push(Object.assign({ id:nextId }, fields));
    acRender();
    acCloseEdit();
    window.showNavToast('Credential added', auction + ' created.');
  } else {
    if(acEditingId == null){ acCloseEdit(); return; }
    const r = AC_SEED.find(function(x){ return x.id === acEditingId; });
    if(r) Object.assign(r, fields);
    acRender();
    acCloseEdit();
    window.showNavToast('Credential saved', auction + ' updated.');
  }
}
function acDelete(){
  if(acEditingMode !== 'edit' || acEditingId == null) return;
  const idx = AC_SEED.findIndex(function(x){ return x.id === acEditingId; });
  if(idx < 0){ acCloseEdit(); return; }
  const removed = AC_SEED.splice(idx, 1)[0];
  acRender();
  acCloseEdit();
  window.showNavToast('Credential deleted', removed.auction + ' removed.');
}
// Close the assign popup when clicking outside (bounding-box hit test)
document.addEventListener('click', function(e){
  const pop = document.getElementById('ac-assign-popup');
  if(!pop || pop.style.display !== 'block') return;
  if(e.target.closest && e.target.closest('#ac-e-users-btn')) return;
  const r = pop.getBoundingClientRect();
  if(e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) return;
  acCloseAssign();
});
window.addEventListener('scroll', function(e){
  const pop = document.getElementById('ac-assign-popup');
  if(pop && pop.style.display === 'block' && !(e.target && e.target.nodeType === 1 && e.target.closest && e.target.closest('#ac-assign-popup'))){
    acCloseAssign();
  }
}, true);
window.addEventListener('resize', acCloseAssign);
acRender();

const acTip = document.createElement('div');
acTip.className = 'ac-tooltip';
document.body.appendChild(acTip);
function acShowTip(target){
  const label = target.getAttribute('data-label'); if(!label) return;
  acTip.textContent = label;
  acTip.classList.add('show');
  const r = target.getBoundingClientRect();
  const tr = acTip.getBoundingClientRect();
  let left = r.left + (r.width - tr.width) / 2;
  let top  = r.top - tr.height - 6;
  if(left < 6) left = 6;
  if(left + tr.width > window.innerWidth - 6) left = window.innerWidth - tr.width - 6;
  if(top < 6) top = r.bottom + 6;
  acTip.style.left = left + 'px';
  acTip.style.top  = top  + 'px';
}
function acHideTip(){ acTip.classList.remove('show'); }
document.addEventListener('mouseover', function(e){
  const av = e.target.closest && e.target.closest('.ac-av[data-label]');
  if(av) acShowTip(av);
});
document.addEventListener('mouseout', function(e){
  const av = e.target.closest && e.target.closest('.ac-av[data-label]');
  if(av) acHideTip();
});
window.addEventListener('scroll', acHideTip, true);
window.addEventListener('resize', acHideTip);
</script>
