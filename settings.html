<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — BuySmart</title>
<link rel="stylesheet" href="shared/app.css">
<link rel="stylesheet" href="shared/settings.css">
<link rel="stylesheet" href="shared/contact-panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0f1117;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
.root.main-area{height:calc(100vh - 64px);min-height:0;overflow:hidden;display:flex;flex-direction:column;}
@media (max-width:640px){ .root.main-area{height:auto;min-height:0;overflow:visible;} }
</style>
</head>
<body>

<div class="root main-area" id="root">
  <div class="set-page-head">
    <span class="set-page-title"></span>
  </div>
  <div class="set-scroll">

    <section class="set-section">
      <div class="settings-section-title">User Management</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('User','Manage users and their info')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">User</div>
            <div class="settings-card-sub">Manage users and their info</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('User Roles','Manage UserRoles')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">User Roles</div>
            <div class="settings-card-sub">Manage UserRoles</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('User Auction Assignment','Manage User Auction Assignment')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">User Auction Assignment</div>
            <div class="settings-card-sub">Manage User Auction Assignment</div>
          </div>
        </button>
      </div>
    </section>

    <section class="set-section">
      <div class="settings-section-title">Auction Setting</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('Auction Credentials','Manage Auction Credentials')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Auction Credentials</div>
            <div class="settings-card-sub">Manage Auction Credentials</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Auction Seller','Manage Auction Seller')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Auction Seller</div>
            <div class="settings-card-sub">Manage Auction Seller</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Item Formula','Manage Item Formula')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="12" y1="10" x2="14" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="12" y1="14" x2="14" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="12" y1="18" x2="16" y2="18"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Item Formula</div>
            <div class="settings-card-sub">Manage Item Formula</div>
          </div>
        </button>
      </div>
    </section>

    <section class="set-section">
      <div class="settings-section-title">Pricing &amp; Scoring</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('Vehicle Score','Manage Vehicle Score')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Vehicle Score</div>
            <div class="settings-card-sub">Manage Vehicle Score</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Adj. Pricing Keyword','Manage Adj. Pricing Keyword')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20V2z" fill="currentColor" stroke="none"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Adj. Pricing Keyword</div>
            <div class="settings-card-sub">Manage Adj. Pricing Keyword</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Comparision Market Amount Setting','Manage Comparison Market Amount')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="20" x2="21" y2="20"/><rect x="5" y="12" width="3" height="8"/><rect x="10.5" y="7" width="3" height="13"/><rect x="16" y="4" width="3" height="16"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Comparision Market Amount Setting</div>
            <div class="settings-card-sub">Manage Comparison Market Amount</div>
          </div>
        </button>
      </div>
    </section>

    <section class="set-section">
      <div class="settings-section-title">System Setting</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('Announcements','Manage Announcements')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Announcements</div>
            <div class="settings-card-sub">Manage Announcements</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('SMS format','Manage your sms format')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">SMS format</div>
            <div class="settings-card-sub">Manage your sms format</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Notification Setting','Change Notification Setting')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Notification Setting</div>
            <div class="settings-card-sub">Change Notification Setting</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Queue Alerts Setting','Change Queue Alerts Setting')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 0 1 6 0c0 3-3 3-3 5"/><line x1="15" y1="16" x2="17" y2="19"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Queue Alerts Setting</div>
            <div class="settings-card-sub">Change Queue Alerts Setting</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Manage Google sheets','Manage Google sheets')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Manage Google sheets</div>
            <div class="settings-card-sub">Manage Google sheets</div>
          </div>
        </button>
      </div>
    </section>

  </div>
</div>

<script src="shared/notifications.js"></script>
<script src="shared/contact-panel.js"></script>
<script src="shared/shell.js"></script>
<script>
BuySmartShell.init({ page: 'settings', title: 'Settings' });

const ST_ROUTES = {
  'User': 'user.html',
  'User Roles': 'userroles.html',
  'User Auction Assignment': 'userauctionassignment.html',
  'Auction Credentials': 'auctioncredentials.html',
  'Auction Seller': 'auctionseller.html',
  'Item Formula': 'itemformula.html',
  'Vehicle Score': 'vehiclescore.html',
  'Adj. Pricing Keyword': 'adjpricingkeyword.html',
  'Comparision Market Amount Setting': 'comparisionmarketamountsetting.html',
  'Announcements': 'announcements.html',
  'SMS format': 'smsformat.html',
  'Notification Setting': 'notificationsetting.html',
  'Queue Alerts Setting': 'queuealertssetting.html',
  'Manage Google sheets': 'googlesheets.html'
};

function stOpen(title, sub){
  const url = ST_ROUTES[title];
  if(url){ window.location.href = url; return; }
  window.showNavToast(title, sub + ' — coming soon.');
}
</script>

</body>
</html>
