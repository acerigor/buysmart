<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — BuySmart</title>
<link rel="stylesheet" href="shared/app.css">
<link rel="stylesheet" href="shared/settings.css">
<link rel="stylesheet" href="shared/contact-panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0f1117;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
.root.main-area{height:calc(100vh - 64px);min-height:0;overflow:hidden;display:flex;flex-direction:column;}
@media (max-width:640px){ .root.main-area{height:auto;min-height:0;overflow:visible;} }
.qa-status-row{display:flex;flex-wrap:wrap;gap:12px;padding:10px 12px;background:var(--sur2);border:0.5px solid var(--brd2);border-radius:8px;}
.qa-chk{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--tx);cursor:pointer;padding:6px 10px;border-radius:6px;transition:background .15s;}
.qa-chk:hover{background:var(--sur);}
.qa-chk input{width:16px;height:16px;accent-color:var(--ac);margin:0;cursor:pointer;}
.st-info-pop{position:fixed;display:none;z-index:120;background:var(--sur2);color:var(--ac2);border:0.5px solid var(--ac);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:500;line-height:1.45;width:max-content;max-width:260px;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.45);font-family:var(--font);}
.st-info-pop.open{display:block;}
.st-info-head{display:none;}
.st-info-body{padding:0;}
@media (max-width:640px){ .st-info-pop{left:8px!important;right:8px;width:auto;max-width:none;} }
</style>
</head>
<body>

<div class="root main-area" id="root">
  <div class="set-page-head">
    <span class="set-page-title"></span>
  </div>
  <div class="set-scroll">

    <section class="set-section">
      <div class="settings-section-title">User Management</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('User','Manage users and their info')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">User</div>
            <div class="settings-card-sub">Manage users and their info</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('User Roles','Manage UserRoles')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">User Roles</div>
            <div class="settings-card-sub">Manage UserRoles</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('User Auction Assignment','Manage User Auction Assignment')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">User Auction Assignment</div>
            <div class="settings-card-sub">Manage User Auction Assignment</div>
          </div>
        </button>
      </div>
    </section>

    <section class="set-section">
      <div class="settings-section-title">Auction Setting</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('Auction Credentials','Manage Auction Credentials')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Auction Credentials</div>
            <div class="settings-card-sub">Manage Auction Credentials</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Auction Seller','Manage Auction Seller')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Auction Seller</div>
            <div class="settings-card-sub">Manage Auction Seller</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Item Formula','Manage Item Formula')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="12" y1="10" x2="14" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="12" y1="14" x2="14" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="12" y1="18" x2="16" y2="18"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Item Formula</div>
            <div class="settings-card-sub">Manage Item Formula</div>
          </div>
        </button>
      </div>
    </section>

    <section class="set-section">
      <div class="settings-section-title">Pricing &amp; Scoring</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('Vehicle Score','Manage Vehicle Score')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Vehicle Score</div>
            <div class="settings-card-sub">Manage Vehicle Score</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Adj. Pricing Keyword','Manage Adj. Pricing Keyword')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20V2z" fill="currentColor" stroke="none"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Adj. Pricing Keyword</div>
            <div class="settings-card-sub">Manage Adj. Pricing Keyword</div>
          </div>
        </button>
        <button class="settings-card" onclick="cmaOpen()">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="20" x2="21" y2="20"/><rect x="5" y="12" width="3" height="8"/><rect x="10.5" y="7" width="3" height="13"/><rect x="16" y="4" width="3" height="16"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Comparision Market Amount Setting</div>
            <div class="settings-card-sub">Manage Comparison Market Amount</div>
          </div>
        </button>
      </div>
    </section>

    <section class="set-section">
      <div class="settings-section-title">System Setting</div>
      <div class="settings-grid">
        <button class="settings-card" onclick="stOpen('Announcements','Manage Announcements')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Announcements</div>
            <div class="settings-card-sub">Manage Announcements</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Tagging format','Manage Tagging format')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Tagging format</div>
            <div class="settings-card-sub">Manage Tagging format</div>
          </div>
        </button>
        <button class="settings-card" onclick="qaOpen()">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 0 1 6 0c0 3-3 3-3 5"/><line x1="15" y1="16" x2="17" y2="19"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Queue Alerts Setting</div>
            <div class="settings-card-sub">Change Queue Alerts Setting</div>
          </div>
        </button>
        <button class="settings-card" onclick="stOpen('Manage Google sheets','Manage Google sheets')">
          <span class="settings-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg></span>
          <div class="settings-card-text">
            <div class="settings-card-title">Manage Google sheets</div>
            <div class="settings-card-sub">Manage Google sheets</div>
          </div>
        </button>
      </div>
    </section>

  </div>
  <div class="modal-backdrop modal-fullscreen-mobile" id="qa-modal" onclick="if(event.target===this) qaClose()">
    <div class="modal modal--wide">
      <div class="modal-header">
        <div class="modal-title">Queue Alerts Setting</div>
        <button class="modal-close" onclick="qaClose()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="us-add-section" style="grid-template-columns:1fr;">
          <div class="us-add-section-head">
            <h4 class="us-add-section-title">Notification Configuration</h4>
          </div>
          <div class="us-add-field" style="grid-column:auto;margin-top:0;">
            <label>Selected Queue</label>
            <select id="qa-queue" style="width:100%;">
              <option value="Data Queue">Data Queue</option>
              <option value="Import Queue">Import Queue</option>
              <option value="Export Queue">Export Queue</option>
              <option value="Sync Queue">Sync Queue</option>
            </select>
          </div>
          <div class="us-add-field" style="grid-column:auto;margin-top:0;">
            <label>Select Queue Status</label>
            <div class="qa-status-row">
              <label class="qa-chk"><input type="checkbox" id="qa-st-pending"/> <span>Pending</span></label>
              <label class="qa-chk"><input type="checkbox" id="qa-st-running"/> <span>Running</span></label>
              <label class="qa-chk"><input type="checkbox" id="qa-st-completed"/> <span>Completed</span></label>
              <label class="qa-chk"><input type="checkbox" id="qa-st-fail"/> <span>Fail</span></label>
            </div>
          </div>
          <div class="us-add-field" style="grid-column:auto;margin-top:0;">
            <label>Alert Notification Format</label>
            <textarea id="qa-format" rows="4" placeholder="Enter alert format" style="width:100%;padding:10px 12px;background:var(--sur2);border:0.5px solid var(--brd2);border-radius:8px;color:var(--tx);font-family:var(--font);font-size:13px;outline:none;resize:vertical;min-height:100px;"></textarea>
          </div>
        </div>
        <div class="us-add-section" style="grid-template-columns:1fr;">
          <div class="us-add-section-head">
            <h4 class="us-add-section-title">Notification Recipients</h4>
          </div>
          <div class="us-add-field" style="grid-column:auto;margin-top:0;">
            <label>Mobile No.</label>
            <input type="text" id="qa-mobile" placeholder="Enter mobile number" style="width:100%;"/>
          </div>
          <div class="us-add-field" style="grid-column:auto;margin-top:0;">
            <label>Email</label>
            <input type="email" id="qa-email" placeholder="Enter email" style="width:100%;"/>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:flex-end;">
        <button class="modal-save"   onclick="qaSave()">Save</button>
        <button class="modal-cancel" onclick="qaClose()">Cancel</button>
      </div>
    </div>
  </div>
  <div class="modal-backdrop modal-fullscreen-mobile" id="cma-modal" onclick="if(event.target===this) cmaClose()">
    <div class="modal modal--wide">
      <div class="modal-header">
        <div class="modal-title">Comparision Market Amount Setting</div>
        <button class="modal-close" onclick="cmaClose()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="us-add-section" style="grid-template-columns:1fr;">
          <div class="us-add-field" style="grid-column:auto;margin-top:0;">
            <label>Comparison Market Amount</label>
            <input type="number" id="cma-amount" inputmode="decimal" step="any" placeholder="0" style="width:100%;"/>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:flex-end;">
        <button class="modal-save"   onclick="cmaSave()">Save</button>
        <button class="modal-cancel" onclick="cmaClose()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="st-info-pop" id="st-info-pop" onclick="event.stopPropagation()">
  <div class="st-info-head">
    <span class="st-info-title" id="st-info-title"></span>
    <button class="st-info-close" onclick="stInfoClose()" aria-label="Close">&#x2715;</button>
  </div>
  <div class="st-info-body" id="st-info-body"></div>
</div>

<script src="shared/notifications.js"></script>
<script src="shared/contact-panel.js"></script>
<script src="shared/shell.js"></script>
<script>
BuySmartShell.init({ page: 'settings', title: 'Settings' });

const ST_ROUTES = {
  'User': 'user.html',
  'User Roles': 'userroles.html',
  'User Auction Assignment': 'userauctionassignment.html',
  'Auction Credentials': 'auctioncredentials.html',
  'Auction Seller': 'auctionseller.html',
  'Item Formula': 'itemformula.html',
  'Vehicle Score': 'vehiclescore.html',
  'Adj. Pricing Keyword': 'adjpricingkeyword.html',
  'Announcements': 'announcements.html',
  'Tagging format': 'smsformat.html',
  'Notification Setting': 'notificationsetting.html',
  'Manage Google sheets': 'googlesheets.html'
};

function stOpen(title, sub){
  const url = ST_ROUTES[title];
  if(url){ window.location.href = url; return; }
  window.showNavToast(title, sub + ' — coming soon.');
}

const CMA_STORE = 'buysmart:cma:amount';

function cmaOpen(){
  let saved = '';
  try { saved = localStorage.getItem(CMA_STORE) || ''; } catch(e){}
  document.getElementById('cma-amount').value = saved;
  document.getElementById('cma-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('cma-amount').focus(); }, 30);
}

function cmaClose(){
  document.getElementById('cma-modal').classList.remove('open');
}

function cmaSave(){
  const raw = document.getElementById('cma-amount').value;
  const n = raw === '' ? 0 : parseFloat(raw);
  if(isNaN(n)){
    window.showNavToast('Invalid number', 'Enter a numeric amount.');
    document.getElementById('cma-amount').focus();
    return;
  }
  try { localStorage.setItem(CMA_STORE, String(n)); } catch(e){}
  cmaClose();
  window.showNavToast('Comparison Market Amount saved', 'Amount = ' + n + '.');
}

const QA_STORE = 'buysmart:queue-alerts';
const QA_STATUSES = ['pending','running','completed','fail'];
const QA_DEFAULT = {
  queue: 'Data Queue',
  statuses: { pending:false, running:false, completed:false, fail:false },
  format: 'Queue Alert : @Sheetname Completed',
  mobile: '8322245677',
  email: ''
};

function qaLoad(){
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(QA_STORE) || 'null'); } catch(e){}
  return Object.assign({}, QA_DEFAULT, saved || {}, {
    statuses: Object.assign({}, QA_DEFAULT.statuses, (saved && saved.statuses) || {})
  });
}

function qaOpen(){
  const s = qaLoad();
  document.getElementById('qa-queue').value = s.queue;
  QA_STATUSES.forEach(function(k){
    document.getElementById('qa-st-' + k).checked = !!s.statuses[k];
  });
  document.getElementById('qa-format').value = s.format;
  document.getElementById('qa-mobile').value = s.mobile;
  document.getElementById('qa-email').value  = s.email;
  document.getElementById('qa-modal').classList.add('open');
}

function qaClose(){
  document.getElementById('qa-modal').classList.remove('open');
}

function qaSave(){
  const data = {
    queue: document.getElementById('qa-queue').value,
    statuses: QA_STATUSES.reduce(function(acc,k){
      acc[k] = document.getElementById('qa-st-' + k).checked;
      return acc;
    }, {}),
    format: document.getElementById('qa-format').value,
    mobile: document.getElementById('qa-mobile').value.trim(),
    email:  document.getElementById('qa-email').value.trim()
  };
  try { localStorage.setItem(QA_STORE, JSON.stringify(data)); } catch(e){}
  qaClose();
  window.showNavToast('Queue Alerts saved', 'Preferences updated.');
}

const ST_INFO = {};   // per-card copy TBD — placeholder used for now.
const ST_INFO_PLACEHOLDER = 'Content coming soon';

function stInfoOpen(anchor, key){
  const pop = document.getElementById('st-info-pop');
  const body = ST_INFO[key] || ST_INFO_PLACEHOLDER;
  document.getElementById('st-info-title').textContent = key;
  document.getElementById('st-info-body').textContent  = body;
  pop.style.left = '-9999px';
  pop.classList.add('open');
  const r = anchor.getBoundingClientRect();
  const w = pop.offsetWidth;
  let top  = r.bottom + 6;
  let left = r.right - w;
  if(left < 8) left = 8;
  if(left + w > window.innerWidth - 8) left = window.innerWidth - w - 8;
  pop.style.top  = top + 'px';
  pop.style.left = left + 'px';
}
function stInfoClose(){
  document.getElementById('st-info-pop').classList.remove('open');
}
document.addEventListener('click', function(e){
  const pop = document.getElementById('st-info-pop');
  if(!pop || !pop.classList.contains('open')) return;
  if(pop.contains(e.target)) return;
  stInfoClose();
});
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') stInfoClose(); });
window.addEventListener('resize', function(){
  const pop = document.getElementById('st-info-pop');
  if(pop && pop.classList.contains('open')) stInfoClose();
});

(function stEnhanceCards(){
  document.querySelectorAll('.settings-card').forEach(function(card){
    if(card.querySelector('.settings-card-info')) return;
    const titleEl = card.querySelector('.settings-card-title');
    if(!titleEl) return;
    const key = titleEl.textContent.trim();
    const span = document.createElement('span');
    span.className = 'settings-card-info';
    span.setAttribute('role', 'button');
    span.setAttribute('tabindex', '0');
    span.setAttribute('aria-label', 'About ' + key);
    span.textContent = 'i';
    span.addEventListener('click', function(e){
      e.stopPropagation();
      stInfoOpen(span, key);
    });
    span.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        e.stopPropagation();
        stInfoOpen(span, key);
      }
    });
    card.appendChild(span);
  });
})();
</script>

</body>
</html>
