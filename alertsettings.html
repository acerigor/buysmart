<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alert Settings — BuySmart</title>
<link rel="stylesheet" href="shared/app.css">
<link rel="stylesheet" href="shared/settings.css">
<link rel="stylesheet" href="shared/contact-panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0f1117;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
.root.main-area{height:calc(100vh - 64px);min-height:0;overflow:hidden;display:flex;flex-direction:column;}
@media (max-width:640px){ .root.main-area{height:auto;min-height:0;overflow:visible;} }
</style>
</head>
<body>

<div class="root main-area" id="root">
  <div class="set-page-head">
    <div class="assign-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="as-search" placeholder="Search alert settings…" oninput="asFilter(this.value)"/>
    </div>
    <div class="sp"></div>
    <button class="tbtn tbtn-p" onclick="asOpenNewAlertModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>New Alert Settings</span>
    </button>
  </div>
  <div class="set-scroll">
    <section class="set-section" style="padding:0;">
      <div class="as-list" id="as-list"></div>
    </section>
  </div>
</div>

<!-- Bucket editor modal -->
<div class="modal-backdrop modal-fullscreen-mobile" id="as-modal" onclick="if(event.target===this)asCloseModal()">
  <div class="modal modal--wide">
    <div class="modal-header">
      <div class="modal-title">Alert Bucket</div>
      <button class="modal-close" onclick="asCloseModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="editor-card">
        <div class="modal-section-title">Name</div>
        <input type="text" class="as-title-input" id="as-title-input" placeholder="Alert name…" maxlength="80"/>
      </div>
      <div class="editor-card">
        <div class="modal-section-title">Actions</div>
        <div class="as-toggle-row">
          <div class="as-toggle-item">
            <span>Alert</span>
            <span class="tog off" id="as-tog-alert" onclick="asToggleFlag(this)"></span>
          </div>
          <div class="as-toggle-item">
            <span>Proxy bid</span>
            <span class="tog off" id="as-tog-proxy" onclick="asToggleFlag(this)"></span>
          </div>
          <div class="as-toggle-item">
            <span>Make Asset Inactive</span>
            <span class="tog off" id="as-tog-inactive" onclick="asToggleFlag(this)"></span>
          </div>
        </div>
      </div>
      <div class="editor-card">
        <div class="modal-section-title">Conditions</div>
        <div class="as-rules" id="as-rules"></div>
        <button class="as-add-rule" onclick="asAddRule()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add condition
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="asCloseModal()">Cancel</button>
      <button class="modal-save" onclick="asSave()">Save</button>
    </div>
  </div>
</div>

<script src="shared/notifications.js"></script>
<script src="shared/contact-panel.js"></script>
<script src="shared/shell.js"></script>
<script>
BuySmartShell.init({ page: 'alert settings', title: 'Alert Settings' });

/* ── Alert bucket editor ─────────────────────────────────────────── */
const AS_FIELDS = [
  {key:'vin',               label:'VIN'},
  {key:'year',              label:'Year'},
  {key:'make',              label:'Make'},
  {key:'model',             label:'Model'},
  {key:'trim',              label:'Trim'},
  {key:'mileage',           label:'Odometer'},
  {key:'vehicleLot',        label:'Vehicle Lot'},
  {key:'acquiredPrice',     label:'Acquired Price'},
  {key:'finalBid',          label:'Final Bid'},
  {key:'buyer',             label:'Buyer'},
  {key:'mmr',               label:'MMR'},
  {key:'pctMarket',         label:'% of Market'},
  {key:'vrank',             label:'VRank'},
  {key:'priceRank',         label:'PriceRank'},
  {key:'mds',               label:'MDS'},
  {key:'carfax',            label:'Carfax'},
  {key:'exteriorColor',     label:'Exterior Color'},
  {key:'carfaxRetailValue', label:'Carfax Retail Value'},
];
const AS_OPS = ['<','<=','>','>=','=','==','Is null','Is not null'];
const AS_STORAGE_KEY = 'buysmart:as:alerts';

const AS_SEED_ALERTS = [
  { id:1, name:'High-mileage flag',
    alertOn:true, proxyOn:false, inactiveOn:false,
    rules:[{ field:'mileage', op:'>=', value:'100000' }] },
  { id:2, name:'Over MMR bid',
    alertOn:true, proxyOn:true, inactiveOn:false,
    rules:[
      { field:'finalBid', op:'>',  value:'0' },
      { field:'mmr',      op:'<=', value:'20000' },
    ] },
  { id:3, name:'Missing Carfax',
    alertOn:false, proxyOn:false, inactiveOn:true,
    rules:[{ field:'carfax', op:'Is null', value:'' }] },
  { id:4, name:'Premium brand watch',
    alertOn:true, proxyOn:false, inactiveOn:false,
    rules:[
      { field:'make',  op:'==', value:'LEXUS' },
      { field:'vrank', op:'<=', value:'20000' },
    ] },
];

let AS_ALERTS = [];
let AS_COUNTER = 0;
let asEditingId = null;
let asSearchQ = '';

function asEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function asLoad(){
  try{
    const raw = localStorage.getItem(AS_STORAGE_KEY);
    if(raw){
      const data = JSON.parse(raw);
      if(data && Array.isArray(data.alerts)){
        AS_ALERTS  = data.alerts;
        AS_COUNTER = data.counter || AS_ALERTS.reduce(function(m,a){ return Math.max(m, a.id); }, 0);
        return;
      }
    }
  }catch(e){}
  AS_ALERTS  = AS_SEED_ALERTS.map(function(a){ return JSON.parse(JSON.stringify(a)); });
  AS_COUNTER = AS_ALERTS.reduce(function(m,a){ return Math.max(m, a.id); }, 0);
  asSaveStorage();
}
function asSaveStorage(){
  try{ localStorage.setItem(AS_STORAGE_KEY, JSON.stringify({alerts:AS_ALERTS, counter:AS_COUNTER})); }catch(e){}
}

function asRenderList(){
  const wrap = document.getElementById('as-list');
  const q = asSearchQ.trim().toLowerCase();
  const visible = AS_ALERTS.filter(function(a){ return !q || a.name.toLowerCase().includes(q); });
  if(!visible.length){
    wrap.innerHTML = '<div class="as-empty">' + (AS_ALERTS.length ? 'No alerts match “' + asEsc(asSearchQ) + '”.' : 'No alerts yet. Click New Alert Settings to add one.') + '</div>';
    return;
  }
  wrap.innerHTML = visible.map(function(a){
    const flags = [];
    if(a.alertOn) flags.push('<span class="as-card-badge on">Alert</span>');
    if(a.proxyOn) flags.push('<span class="as-card-badge on">Proxy bid</span>');
    if(a.inactiveOn) flags.push('<span class="as-card-badge on">Make Inactive</span>');
    if(!flags.length) flags.push('<span class="as-card-badge">No actions</span>');
    const ruleCount = (a.rules || []).length;
    return '<div class="as-card" onclick="asOpenEdit(' + a.id + ')">' +
      '<div class="as-card-name">' + asEsc(a.name || 'Untitled alert') + '</div>' +
      '<div class="as-card-meta">' + flags.join('') + '<span>' + ruleCount + ' condition' + (ruleCount===1?'':'s') + '</span></div>' +
    '</div>';
  }).join('');
}

function asFilter(q){ asSearchQ = q || ''; asRenderList(); }

function asToggleFlag(el){ el.classList.toggle('off'); }

function asOpenNewAlertModal(){
  asEditingId = null;
  document.getElementById('as-title-input').value = '';
  document.getElementById('as-tog-alert').classList.add('off');
  document.getElementById('as-tog-proxy').classList.add('off');
  document.getElementById('as-tog-inactive').classList.add('off');
  document.getElementById('as-rules').innerHTML = '';
  asAddRule();
  document.getElementById('as-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('as-title-input').focus(); }, 30);
}

function asOpenEdit(id){
  const a = AS_ALERTS.find(function(x){ return x.id === id; });
  if(!a) return;
  asEditingId = id;
  document.getElementById('as-title-input').value = a.name || '';
  document.getElementById('as-tog-alert').classList.toggle('off', !a.alertOn);
  document.getElementById('as-tog-proxy').classList.toggle('off', !a.proxyOn);
  document.getElementById('as-tog-inactive').classList.toggle('off', !a.inactiveOn);
  const rulesEl = document.getElementById('as-rules');
  rulesEl.innerHTML = '';
  (a.rules && a.rules.length ? a.rules : [{field:'', op:'', value:''}]).forEach(function(r){ asAddRule(r); });
  document.getElementById('as-modal').classList.add('open');
}

function asCloseModal(){
  document.getElementById('as-modal').classList.remove('open');
  asEditingId = null;
}

function asRuleHtml(rule){
  const r = rule || {field:'', op:'', value:''};
  const fieldOpts = '<option value="">Select field…</option>' + AS_FIELDS.map(function(f){
    return '<option value="' + f.key + '"' + (f.key === r.field ? ' selected' : '') + '>' + asEsc(f.label) + '</option>';
  }).join('');
  const opOpts = '<option value="">Operator…</option>' + AS_OPS.map(function(o){
    return '<option value="' + asEsc(o) + '"' + (o === r.op ? ' selected' : '') + '>' + asEsc(o) + '</option>';
  }).join('');
  const isNullOp = r.op === 'Is null' || r.op === 'Is not null';
  return '<div class="as-rule">' +
    '<select class="as-rule-field" onchange="asRuleChange(this)">' + fieldOpts + '</select>' +
    '<select class="as-rule-op" onchange="asRuleChange(this)">' + opOpts + '</select>' +
    '<input class="as-rule-value" type="text" placeholder="Value" value="' + asEsc(r.value || '') + '"' + (isNullOp ? ' disabled' : '') + '/>' +
    '<button class="as-rule-del" onclick="asRemoveRule(this)" aria-label="Remove condition">&#x2715;</button>' +
  '</div>';
}

function asAddRule(rule){
  const wrap = document.getElementById('as-rules');
  wrap.insertAdjacentHTML('beforeend', asRuleHtml(rule));
}

function asRemoveRule(btn){
  const row = btn.closest('.as-rule');
  if(row) row.remove();
}

function asRuleChange(el){
  // Disable value input when operator is a null-check
  if(el.classList.contains('as-rule-op')){
    const row = el.closest('.as-rule');
    const valInput = row.querySelector('.as-rule-value');
    const isNullOp = el.value === 'Is null' || el.value === 'Is not null';
    valInput.disabled = isNullOp;
    if(isNullOp) valInput.value = '';
  }
}

function asReadModal(){
  const rules = Array.from(document.querySelectorAll('#as-rules .as-rule')).map(function(row){
    return {
      field: row.querySelector('.as-rule-field').value,
      op:    row.querySelector('.as-rule-op').value,
      value: row.querySelector('.as-rule-value').value,
    };
  });
  return {
    name: document.getElementById('as-title-input').value.trim(),
    alertOn:    !document.getElementById('as-tog-alert').classList.contains('off'),
    proxyOn:    !document.getElementById('as-tog-proxy').classList.contains('off'),
    inactiveOn: !document.getElementById('as-tog-inactive').classList.contains('off'),
    rules: rules,
  };
}

function asSave(){
  const data = asReadModal();
  if(!data.name){
    window.showNavToast('Name required', 'Give this alert a name before saving.');
    document.getElementById('as-title-input').focus();
    return;
  }
  if(asEditingId != null){
    const a = AS_ALERTS.find(function(x){ return x.id === asEditingId; });
    if(a) Object.assign(a, data);
  } else {
    AS_COUNTER += 1;
    AS_ALERTS.push(Object.assign({id: AS_COUNTER}, data));
  }
  asSaveStorage();
  asRenderList();
  asCloseModal();
  window.showNavToast('Alert saved', '"' + data.name + '" is active.');
}

asLoad();
asRenderList();
</script>

</body>
</html>
