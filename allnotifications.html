<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Notifications — BuySmart</title>
<link rel="stylesheet" href="shared/app.css">
<link rel="stylesheet" href="shared/settings.css">
<link rel="stylesheet" href="shared/contact-panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0f1117;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
.root.main-area{height:calc(100vh - 64px);min-height:0;overflow:hidden;display:flex;flex-direction:column;}
@media (max-width:640px){ .root.main-area{height:auto;min-height:0;overflow:visible;} }
.an-period-toggle{display:inline-flex;align-items:center;gap:2px;padding:3px;background:var(--sur2);border:0.5px solid var(--brd2);border-radius:8px;}
.an-period-btn{padding:6px 12px;background:transparent;border:none;color:var(--mu);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:background .12s, color .12s;}
.an-period-btn:hover{color:var(--tx);}
.an-period-btn.active{background:var(--ac);color:#fff;}
.an-list-wrap{padding:0;}
.an-list{display:flex;flex-direction:column;background:var(--sur);border:0.5px solid var(--brd2);border-radius:10px;overflow:hidden;}
.an-list .cc-ntf-row{padding:14px 18px;}
.an-empty{max-width:960px;margin:24px auto;padding:32px 16px;text-align:center;color:var(--mu);font-size:13px;background:var(--sur);border:0.5px solid var(--brd2);border-radius:10px;}
.an-empty-ic{font-size:24px;margin-bottom:6px;}
@media (max-width:640px){
  .an-period-toggle{flex-wrap:wrap;}
  .an-period-btn{min-height:44px;padding:10px 14px;font-size:14px;}
  .an-list-wrap{padding:0 12px;}
  .assign-search{flex:1;min-width:180px;}
}
</style>
</head>
<body>

<div class="root main-area" id="root">
  <div class="set-page-head">
    <button class="back-btn" onclick="history.back()" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="an-period-toggle" role="tablist" aria-label="Notification period">
      <button class="an-period-btn active" data-period="today"   onclick="anSetPeriod('today')">Today</button>
      <button class="an-period-btn"        data-period="weekly"  onclick="anSetPeriod('weekly')">Weekly</button>
      <button class="an-period-btn"        data-period="monthly" onclick="anSetPeriod('monthly')">Monthly</button>
      <button class="an-period-btn"        data-period="all"     onclick="anSetPeriod('all')">All</button>
    </div>
    <button class="tbtn tbtn-icon" id="an-filter-btn" data-tooltip="Filter" aria-label="Filter" onclick="anOpenFilter(event)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    </button>
    <div class="sp"></div>
    <div class="assign-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="an-search" type="text" placeholder="Search notifications…" oninput="anSetSearch(this.value)"/>
    </div>
  </div>
  <div class="fd-wrap" id="an-filter-drawer" onclick="event.stopPropagation()">
    <div class="fd-left">
      <div class="fd-list" id="an-fd-cats"></div>
      <div class="fd-foot">
        <span class="fd-clear" onclick="anClearAllFilters()">Clear all</span>
        <span class="fd-foot-hint">Esc to close</span>
      </div>
    </div>
    <div class="fd-right" id="an-fd-right"></div>
  </div>
  <div class="set-scroll">
    <section class="set-section" style="padding:0;">
      <div class="an-list-wrap" id="an-list-wrap"></div>
    </section>
  </div>
</div>

<script src="shared/notifications.js"></script>
<script src="shared/contact-panel.js"></script>
<script src="shared/shell.js"></script>
<script>
BuySmartShell.init({ page: 'notifications' });
let anPeriod = 'today';
let anSearch = '';
function anSetSearch(q){
  anSearch = q || '';
  anRender();
}
const AN_FILTERS_STORE = 'buysmart:an-filters';
const AN_FILTER_CATS = [
  { key:'year',   label:'Year'        },
  { key:'make',   label:'Make'        },
  { key:'model',  label:'Model'       },
  { key:'user',   label:'User'        },
  { key:'read',   label:'Read Status' }
];
const AN_DEFAULT_FILTERS = { yearMin:'', yearMax:'', makes:[], models:[], users:[], readState:'all' };
let anActiveCat = 'year';
let anCatSearch = '';
let anFilters = anLoadFilters();
function anLoadFilters(){
  try {
    var v = JSON.parse(localStorage.getItem(AN_FILTERS_STORE) || 'null');
    if(v && typeof v === 'object') return Object.assign({}, AN_DEFAULT_FILTERS, v, {
      makes:  Array.isArray(v.makes)  ? v.makes  : [],
      models: Array.isArray(v.models) ? v.models : [],
      users:  Array.isArray(v.users)  ? v.users  : []
    });
  } catch(e){}
  return Object.assign({}, AN_DEFAULT_FILTERS);
}
function anSaveFilters(){
  try { localStorage.setItem(AN_FILTERS_STORE, JSON.stringify(anFilters)); } catch(e){}
  anSyncFilterBadge();
}
function anHasActiveFilters(){
  return !!(anFilters.yearMin || anFilters.yearMax ||
    anFilters.makes.length || anFilters.models.length || anFilters.users.length ||
    (anFilters.readState && anFilters.readState !== 'all'));
}
function anSyncFilterBadge(){
  var btn = document.getElementById('an-filter-btn');
  if(btn) btn.classList.toggle('active-filter', anHasActiveFilters());
}
function anDistinctFor(field){
  var s = new Set();
  var all = (typeof window.ccNotifAll === 'function') ? window.ccNotifAll() : [];
  all.forEach(function(n){
    if(n.type !== 'comment') return;
    var v = (field === 'user') ? n.leadName : (field === 'make' ? n.vdMake : n.vdModel);
    if(v) s.add(String(v));
  });
  return Array.from(s).sort();
}
function anCatCount(key){
  if(key === 'year')  return (anFilters.yearMin || anFilters.yearMax) ? 1 : 0;
  if(key === 'make')  return anFilters.makes.length;
  if(key === 'model') return anFilters.models.length;
  if(key === 'user')  return anFilters.users.length;
  if(key === 'read')  return (anFilters.readState && anFilters.readState !== 'all') ? 1 : 0;
  return 0;
}
function anRenderFilterLeft(){
  var host = document.getElementById('an-fd-cats');
  if(!host) return;
  host.innerHTML = AN_FILTER_CATS.map(function(c){
    var count = anCatCount(c.key);
    var chip = count > 0 ? '<span class="fd-cat-count">' + count + '</span>' : '';
    return '<div class="fd-cat' + (c.key === anActiveCat ? ' active' : '') + '" onclick="anSelectCat(\'' + c.key + '\')">' +
      '<span class="fd-cat-label">' + anEsc(c.label) + '</span>' +
      chip +
      '<span class="fd-cat-chev">&#8250;</span>' +
    '</div>';
  }).join('');
}
function anSelectCat(key){
  anActiveCat = key;
  anCatSearch = '';
  anRenderFilterLeft();
  anRenderFilterRight();
}
function anRenderFilterRight(){
  var right = document.getElementById('an-fd-right');
  if(!right) return;
  right.classList.add('show');
  if(anActiveCat === 'year'){
    right.innerHTML =
      '<div class="fd-search-input" style="border-bottom:0.5px solid var(--brd);"><input type="text" placeholder="Year range" disabled style="cursor:default;background:transparent;border:none;padding:0;color:var(--mu);"/></div>' +
      '<div class="fd-range">' +
        '<input type="number" placeholder="Start" value="' + anEsc(anFilters.yearMin) + '" oninput="anSetYear(\'yearMin\', this.value)"/>' +
        '<span class="fd-range-dash">&mdash;</span>' +
        '<input type="number" placeholder="End" value="' + anEsc(anFilters.yearMax) + '" oninput="anSetYear(\'yearMax\', this.value)"/>' +
      '</div>';
    return;
  }
  if(anActiveCat === 'read'){
    var opts = [ {v:'all',label:'All'}, {v:'unread',label:'Unread'}, {v:'read',label:'Read'} ];
    right.innerHTML =
      '<div class="fd-opts">' +
        opts.map(function(o){
          var chosen = anFilters.readState === o.v;
          return '<div class="fd-opt' + (chosen ? ' chosen' : '') + '" onclick="anSetRead(\'' + o.v + '\')">' +
            '<span class="fd-opt-label">' + anEsc(o.label) + '</span>' +
          '</div>';
        }).join('') +
      '</div>';
    return;
  }
  // make / model / user — checkbox list with search
  var vals = anDistinctFor(anActiveCat);
  var q = anCatSearch.trim().toLowerCase();
  if(q) vals = vals.filter(function(v){ return v.toLowerCase().indexOf(q) !== -1; });
  var selKey = anActiveCat === 'make' ? 'makes' : (anActiveCat === 'model' ? 'models' : 'users');
  var selected = anFilters[selKey];
  right.innerHTML =
    '<div class="fd-search"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>' +
      '<input type="text" placeholder="Search" value="' + anEsc(anCatSearch) + '" oninput="anSetCatSearch(this.value)"/></div>' +
    '<div class="fd-opts">' +
      (vals.length ?
        vals.map(function(v){
          var chosen = selected.indexOf(v) !== -1;
          return '<div class="fd-opt' + (chosen ? ' chosen' : '') + '" onclick="anToggleValue(\'' + selKey + '\', \'' + anEsc(v).replace(/'/g,"&#39;") + '\')">' +
            '<span class="fd-opt-label">' + anEsc(v) + '</span>' +
          '</div>';
        }).join('')
        : '<div class="fd-empty">No matches</div>') +
    '</div>';
}
function anSetCatSearch(q){ anCatSearch = q || ''; anRenderFilterRight(); }
function anSetYear(field, val){
  anFilters[field] = String(val||'').replace(/[^0-9]/g,'').slice(0,4);
  anSaveFilters();
  anRenderFilterLeft();
  anRender();
}
function anSetRead(v){
  anFilters.readState = v;
  anSaveFilters();
  anRenderFilterLeft();
  anRenderFilterRight();
  anRender();
}
function anToggleValue(key, v){
  var idx = anFilters[key].indexOf(v);
  if(idx === -1) anFilters[key].push(v); else anFilters[key].splice(idx, 1);
  anSaveFilters();
  anRenderFilterLeft();
  anRenderFilterRight();
  anRender();
}
function anClearAllFilters(){
  anFilters = Object.assign({}, AN_DEFAULT_FILTERS, { makes:[], models:[], users:[] });
  anSaveFilters();
  anRenderFilterLeft();
  anRenderFilterRight();
  anRender();
}
function anPositionFilterDrawer(){
  var wrap = document.getElementById('an-filter-drawer');
  var btn  = document.getElementById('an-filter-btn');
  if(!wrap || !btn) return;
  var r = btn.getBoundingClientRect();
  var width = 480;
  var top = r.bottom + 6;
  var left = r.left;
  if(left + width > window.innerWidth - 8) left = window.innerWidth - width - 8;
  if(left < 8) left = 8;
  wrap.style.top  = top + 'px';
  wrap.style.left = left + 'px';
}
function anOpenFilter(e){
  if(e) e.stopPropagation();
  var wrap = document.getElementById('an-filter-drawer');
  if(wrap.classList.contains('open')){ anCloseFilterDrawer(); return; }
  anRenderFilterLeft();
  anRenderFilterRight();
  wrap.classList.add('open');
  anPositionFilterDrawer();
}
function anCloseFilterDrawer(){
  var wrap = document.getElementById('an-filter-drawer');
  if(wrap) wrap.classList.remove('open');
}
document.addEventListener('click', function(e){
  var wrap = document.getElementById('an-filter-drawer');
  var btn  = document.getElementById('an-filter-btn');
  if(!wrap || !wrap.classList.contains('open')) return;
  if(wrap.contains(e.target) || (btn && btn.contains(e.target))) return;
  anCloseFilterDrawer();
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') anCloseFilterDrawer();
});
window.addEventListener('resize', function(){
  var wrap = document.getElementById('an-filter-drawer');
  if(wrap && wrap.classList.contains('open')) anPositionFilterDrawer();
});
anSyncFilterBadge();
function anSetPeriod(p){
  anPeriod = p;
  document.querySelectorAll('.an-period-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-period') === p);
  });
  anRender();
}
const AN_ICONS = {
  sms:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
  email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
  call:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
  appt:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  comment: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
};
const AN_TCOLOR = { sms:'#2dd4bf', email:'#6e9dff', call:'#e85555', appt:'#f5a623', comment:'#a78bfa' };
const AN_TBG    = { sms:'rgba(45,212,191,.14)', email:'rgba(110,157,255,.14)', call:'rgba(232,85,85,.14)', appt:'rgba(245,166,35,.14)', comment:'rgba(167,139,250,.14)' };
function anEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function anRel(ts){
  var d = (Date.now() - ts)/1000;
  if(d < 45) return 'Just now';
  if(d < 3600) return Math.round(d/60) + 'm ago';
  if(d < 86400) return Math.round(d/3600) + 'h ago';
  if(d < 172800) return 'Yesterday';
  var dt = new Date(ts), MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return MO[dt.getMonth()] + ' ' + dt.getDate();
}
function anPeriodStart(period){
  var now = new Date();
  if(period === 'today'){
    var t = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return t.getTime();
  }
  if(period === 'weekly')  return Date.now() - 7*24*3600*1000;
  if(period === 'monthly') return Date.now() - 30*24*3600*1000;
  return -Infinity;
}
function anRowHtml(n){
  var typeBg = AN_TBG[n.type]||'rgba(255,255,255,.06)';
  var typeFg = AN_TCOLOR[n.type]||'#6e9dff';
  return '<button class="cc-ntf-row'+(n.read?'':' is-unread')+'" data-id="'+anEsc(n.id)+'" onclick="ccNotifClickRow(\''+anEsc(n.id)+'\')">'
    + '<span class="cc-ntf-ic" style="background:'+typeBg+';color:'+typeFg+'">'+(AN_ICONS[n.type]||'')+'</span>'
    + '<span class="cc-ntf-av" style="background:'+anEsc(n.leadColor||'#4f7cff')+'">'+anEsc(n.leadAv||'??')+'</span>'
    + '<span class="cc-ntf-txt">'
      + '<span class="cc-ntf-line"><strong>'+anEsc(n.title)+'</strong> &middot; '+anEsc(n.leadName||'')+'</span>'
      + '<span class="cc-ntf-body">'+anEsc(n.body)+'</span>'
      + '<span class="cc-ntf-time">'+anEsc(anRel(n.ts))+'</span>'
    + '</span>'
    + '<span class="cc-ntf-dot" aria-hidden="true"></span>'
  + '</button>';
}
function anRender(){
  var wrap = document.getElementById('an-list-wrap');
  if(!wrap) return;
  var all = (typeof window.ccNotifAll === 'function') ? window.ccNotifAll() : [];
  var floor = anPeriodStart(anPeriod);
  var q = String(anSearch||'').trim().toLowerCase();
  var yMin = anFilters.yearMin ? parseInt(anFilters.yearMin,10) : null;
  var yMax = anFilters.yearMax ? parseInt(anFilters.yearMax,10) : null;
  var filtered = all.filter(function(n){
    if(n.ts < floor) return false;
    if(yMin != null && (Number(n.vdYear)||0) < yMin) return false;
    if(yMax != null && (Number(n.vdYear)||9999) > yMax) return false;
    if(anFilters.makes.length  && anFilters.makes.indexOf(n.vdMake) === -1) return false;
    if(anFilters.models.length && anFilters.models.indexOf(n.vdModel) === -1) return false;
    if(anFilters.users.length  && anFilters.users.indexOf(n.leadName) === -1) return false;
    if(anFilters.readState === 'unread' && n.read) return false;
    if(anFilters.readState === 'read'   && !n.read) return false;
    if(!q) return true;
    return (String(n.title||'').toLowerCase().indexOf(q) !== -1) ||
           (String(n.body ||'').toLowerCase().indexOf(q) !== -1) ||
           (String(n.leadName||'').toLowerCase().indexOf(q) !== -1) ||
           (String(n.type ||'').toLowerCase().indexOf(q) !== -1);
  });
  if(!filtered.length){
    wrap.innerHTML = '<div class="an-empty"><div class="an-empty-ic">🔔</div>' + (q ? 'No matches for “' + anEsc(anSearch) + '”' : 'No notifications for this period') + '</div>';
    return;
  }
  wrap.innerHTML = '<div class="an-list">' + filtered.map(anRowHtml).join('') + '</div>';
}
anRender();
</script>

</body>
</html>
